<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      width: 100%;
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .location {
      font-size: 12px;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .update-time {
      font-size: 10px;
      opacity: 0.5;
    }
    .main {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .weather-icon {
      font-size: 48px;
      line-height: 1;
    }
    .temp-section {
      display: flex;
      flex-direction: column;
    }
    .temperature {
      font-size: 42px;
      font-weight: 300;
      line-height: 1;
    }
    .condition {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .feels-like {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 2px;
    }
    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(128, 128, 128, 0.2);
    }
    .detail-item {
      text-align: center;
    }
    .detail-label {
      font-size: 10px;
      opacity: 0.6;
    }
    .detail-value {
      font-size: 13px;
      font-weight: 500;
      margin-top: 2px;
    }
    .loading, .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      opacity: 0.6;
    }
    .loading i, .error i {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.5;
      padding: 4px;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 1; }
    .theme-light {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
    }
    .theme-dark {
      background: rgba(30, 30, 40, 0.9);
      color: #fff;
    }
  </style>
  <link rel="stylesheet" href="../../../../renderer/remixicon-local.css">
</head>
<body>
  <div class="container" id="app">
    <div class="loading">
      <i class="ri-loader-4-line"></i>
      <span>加载中...</span>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    
    let config = {
      useCustomLocation: false,
      customCityId: '',
      customCityName: '',
      theme: 'auto',
      showDetails: true
    };
    
    let weatherData = null;
    
    const WEATHER_ICONS = {
      '0': 'ri-sun-line',
      '1': 'ri-sun-cloudy-line',
      '2': 'ri-cloud-line',
      '3': 'ri-rainy-line',
      '4': 'ri-thunderstorms-line',
      '5': 'ri-hail-line',
      '6': 'ri-snowy-line',
      '7': 'ri-drizzle-line',
      '8': 'ri-rainy-line',
      '9': 'ri-heavy-showers-line',
      '10': 'ri-heavy-showers-line',
      '11': 'ri-heavy-showers-line',
      '12': 'ri-heavy-showers-line',
      '13': 'ri-snowy-line',
      '14': 'ri-snowy-line',
      '15': 'ri-snowy-line',
      '16': 'ri-snowy-fill',
      '17': 'ri-snowy-fill',
      '18': 'ri-mist-line',
      '19': 'ri-hail-line',
      '20': 'ri-sandstorm-line',
      '21': 'ri-rainy-line',
      '22': 'ri-heavy-showers-line',
      '23': 'ri-heavy-showers-line',
      '24': 'ri-heavy-showers-line',
      '25': 'ri-heavy-showers-line',
      '26': 'ri-snowy-line',
      '27': 'ri-snowy-line',
      '28': 'ri-snowy-fill',
      '29': 'ri-haze-line',
      '30': 'ri-sandstorm-line',
      '31': 'ri-sandstorm-line',
      '32': 'ri-smog-line',
      '49': 'ri-mist-line',
      '53': 'ri-smog-line',
      '54': 'ri-smog-line',
      '55': 'ri-smog-line',
      '56': 'ri-smog-line'
    };
    
    function getWeatherIcon(code) {
      return WEATHER_ICONS[String(code)] || 'ri-sun-line';
    }
    
    function applyTheme() {
      const body = document.body;
      body.classList.remove('theme-light', 'theme-dark');
      
      let theme = config.theme;
      if (theme === 'auto') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = isDark ? 'dark' : 'light';
      }
      
      body.classList.add(`theme-${theme}`);
    }
    
    function formatTime(isoString) {
      if (!isoString) return '';
      try {
        const date = new Date(isoString);
        return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        return '';
      }
    }
    
    function render() {
      const app = document.getElementById('app');
      
      if (!weatherData || weatherData.ok === false) {
        app.innerHTML = `
          <div class="error">
            <i class="ri-cloud-off-line"></i>
            <span>${weatherData?.error || '获取天气失败'}</span>
          </div>
        `;
        return;
      }
      
      const current = weatherData.current || {};
      const location = weatherData.location || {};
      
      const iconClass = getWeatherIcon(current.conditionCode);
      
      let detailsHtml = '';
      if (config.showDetails) {
        detailsHtml = `
          <div class="details">
            <div class="detail-item">
              <div class="detail-label">湿度</div>
              <div class="detail-value">${current.humidity ?? '--'}%</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">风速</div>
              <div class="detail-value">${current.windSpeed ?? '--'} m/s</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">风向</div>
              <div class="detail-value">${current.windDir || '--'}</div>
            </div>
          </div>
        `;
      }
      
      app.innerHTML = `
        <div class="header">
          <div class="location">
            <i class="ri-map-pin-line"></i>
            <span>${location.name || '未知位置'}</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="update-time">${formatTime(current.updateTime)}</span>
            <button class="refresh-btn" onclick="refreshWeather()" title="刷新">
              <i class="ri-refresh-line"></i>
            </button>
          </div>
        </div>
        <div class="main">
          <div class="weather-icon">
            <i class="${iconClass}"></i>
          </div>
          <div class="temp-section">
            <div class="temperature">${current.temp ?? '--'}°</div>
            <div class="condition">${current.condition || '--'}</div>
            <div class="feels-like">体感 ${current.feelsLike ?? '--'}°C</div>
          </div>
        </div>
        ${detailsHtml}
      `;
    }
    
    async function callWeatherPlugin(fnName, args) {
      try {
        const result = await ipcRenderer.invoke('desktop-widgets:call-plugin', {
          pluginId: 'service-weather',
          fn: fnName,
          args: args
        });
        return result?.result || result;
      } catch (e) {
        return { ok: false, error: e.message };
      }
    }
    
    async function fetchWeather() {
      try {
        let result;
        
        if (config.useCustomLocation && config.customCityId) {
          result = await callWeatherPlugin('getWeatherByCityId', [config.customCityId]);
        } else {
          result = await callWeatherPlugin('getWeather', []);
        }
        
        weatherData = result;
        render();
      } catch (e) {
        weatherData = { ok: false, error: e.message };
        render();
      }
    }
    
    async function refreshWeather() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="loading">
          <i class="ri-loader-4-line ri-spin"></i>
          <span>刷新中...</span>
        </div>
      `;
      await fetchWeather();
    }
    
    ipcRenderer.on('config-updated', (event, newConfig) => {
      config = { ...config, ...newConfig };
      applyTheme();
      fetchWeather();
    });
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (config.theme === 'auto') applyTheme();
    });
    
    applyTheme();
    fetchWeather();
    
    setInterval(fetchWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
